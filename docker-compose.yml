services:
  postgres:
    image: postgres:15-alpine
    container_name: assignment-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ingestion
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - assignment-network

  ingestion:
    build: ./packages/ingestion
    container_name: assignment-ingestion
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ingestion
      DASHBOARD_URL: http://datasync-dev-alb-101078500.us-east-1.elb.amazonaws.com
      TARGET_API_KEY: ${TARGET_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - assignment-network
    restart: on-failure

volumes:
  pgdata:

networks:
  assignment-network:
    driver: bridge